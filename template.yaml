AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  Collect resources from AWS accounts

Parameters:
  Domain:
    Type: String
    Description: 'Application Domain'

  System:
    Type: String
    Description: 'Application System'

  Component:
    Type: String
    Description: 'Application Component'

  CodeBranch:
    Type: String
    Description: "Name of deployment branch"

  CatalogEndpoint:
    Type: String
    Description: "Catalog endpoint"

  ClientId:
    Type: String
    Description: "Client ID"
    NoEcho: true

  ClientSecret:
    Type: String
    Description: "Client Secret"
    NoEcho: true

  CrossAccountRoleName:
    Type: String
    Description: "Cross account role name"

  AwsOrganizationId:
    Type: String
    Description: "AWS Organization ID"

  AllEventsLog:
    Type: String
    Description: "Whether to log all events to CloudWatch"
    Default: DISABLED
    AllowedValues:
      - ENABLED
      - DISABLED
      - ENABLED_WITH_ALL_CLOUDTRAIL_MANAGEMENT_EVENTS
    ConstraintDescription: "Must be either ENABLED, DISABLED, or ENABLED_WITH_ALL_CLOUDTRAIL_MANAGEMENT_EVENTS"

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 128
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: !Ref AWS::StackName
        POWERTOOLS_LOG_LEVEL: INFO

Resources:
  ###
  # Service eventbus
  ###
  AwsResourceCollectorDlq:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600 # 14 days
      VisibilityTimeout: 300 # 5 minutes

  AwsResourceCollectorDlqPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref AwsResourceCollectorDlq
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt AwsResourceCollectorDlq.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt AwsResourceCollectorBus.Arn

  AwsResourceCollectorBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "${AWS::StackName}-AwsResourceCollectorBus"
      Policy:
        Version: '2012-10-17'
        Statement:
          - Sid: CrossAccountAllowPutEvents
            Effect: Allow
            Principal: '*'
            Action:
              - events:PutEvents
            Resource: "*"
            Condition:
              StringEquals:
                "aws:PrincipalOrgID": !Ref AwsOrganizationId
      DeadLetterConfig:
        Arn: !GetAtt AwsResourceCollectorDlq.Arn

  AllEventsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/events/${AWS::StackName}/AwsResourceCollectorBus/all"
      RetentionInDays: 5

  AwsResourceCollectorBusRule:
    Type: AWS::Events::Rule
    Properties:
      Description: "Rule to log all events to CloudWatch"
      EventBusName: !Ref AwsResourceCollectorBus
      State: !Ref AllEventsLog
      EventPattern:
        account:
          - wildcard: '*'
      Targets:
        - Arn: !GetAtt AllEventsLogGroup.Arn
          Id: "AllEventsLogGroup"


  ###
  # List AWS accounts
  ###
  ListAccountsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/handlers/ListAccounts
      Handler: function.handler
      Description: List AWS accounts
      Timeout: 15
      Events:
        Schedule:
          Type: ScheduleV2
          Properties:
            OmitName: true  # Needed for feature bramnch deployment
            ScheduleExpression: rate(120 minutes)
      Policies:
        - EventBridgePutEventsPolicy:
            EventBusName: !Ref AwsResourceCollectorBus
        - AWSOrganizationsReadOnlyAccess
      Environment:
        Variables:
          EVENT_BUS_NAME: !Ref AwsResourceCollectorBus

          SNS_TOPIC_ARN: !Ref ListAccountsSnsTopic

  ListAccountsSnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: ListAccounts Destination


  ###
  # Process resources
  ###

  # Process accounts
  ProcessAccountSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      MessageRetentionPeriod: 300   # Go away before next invocation of ListAccountsFunction

  ProcessAccountSqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ProcessAccountSqsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt ProcessAccountSqsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt ListAccountsSnsTopic.TopicArn

  ProcessAccountSubscribeQueueToTopic:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      TopicArn: !Ref ListAccountsSnsTopic
      Endpoint: !GetAtt ProcessAccountSqsQueue.Arn
      RawMessageDelivery: true

  ProcessAccountFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/handlers/ProcessAccount
      Handler: function.handler
      Description: process account entity
      Timeout: 5
      Environment:
        Variables:
          CATALOG_ENDPOINT: !Ref CatalogEndpoint
          CLIENT_ID: !Ref ClientId
          CLIENT_SECRET: !Ref ClientSecret
          SQS_QUEUE_URL: !GetAtt AddEntityToCatalogSqsQueue.QueueUrl
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AddEntityToCatalogSqsQueue.QueueName
      Events:
        Sqs:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessAccountSqsQueue.Arn
            BatchSize: 1


  ###
  # Add to Catalog
  ###
  AddEntityToCatalogSqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 120
      MessageRetentionPeriod: 300   # Go away before next invocation of ListAccountsFunction

  AddEntityToCatalogFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src/handlers/AddEntityToCatalog
      Handler: function.handler
      Description: Add entity to catalog
      Timeout: 5
      Environment:
        Variables:
          CATALOG_ENDPOINT: !Ref CatalogEndpoint
          CLIENT_ID: !Ref ClientId
          CLIENT_SECRET: !Ref ClientSecret
      Events:
        Sqs:
          Type: SQS
          Properties:
            Queue: !GetAtt AddEntityToCatalogSqsQueue.Arn
            BatchSize: 10
